<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List UI</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <p class="subtitle">Stay organized and get things done.</p>

      <h1>My To Do List 📝</h1>

      <div class="input-area">
        <input type="text" placeholder="Add a new task..." />
        <button>Add</button>
      </div>

      <div class="tasks">
        <div class="task">
          <span>Learn HTML</span>
          <input type="checkbox" />
        </div>

        <div class="task">
          <span>Build project</span>
          <input type="checkbox" />
        </div>

        <div class="task">
          <span>Practice CSS</span>
          <input type="checkbox" />
        </div>

        <div class="task">
          <span> Push project to GitHub </span>
          <input type="checkbox" />
        </div>
      </div>
    </div>
  </body>
</html>
